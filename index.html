<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repositories</title>
  <style>
    :root { color-scheme: dark; }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: sans-serif;
      font-size: 1rem;
      padding: 4rem 2rem;
    }

    h1 { margin-bottom: 2rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .card {
      border: 1px solid #333;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .card a {
      color: #fff;
      font-weight: bold;
      text-decoration: none;
    }

    .card a:hover { text-decoration: underline; }

    .card p {
      color: #aaa;
      font-size: 0.875rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Repositories:</h1>

  <div class="grid">

    <div class="card">
      <a href="https://github.com/user/repo-name" target="_blank">repo-name</a>
      <p>Opis repozytorium.</p>
    </div>

    <div class="card">
      <a href="https://github.com/user/repo-name-2" target="_blank">repo-name-2</a>
      <p>Opis repozytorium.</p>
    </div>

    <div class="card">
      <a href="https://github.com/user/repo-name-3" target="_blank">repo-name-3</a>
      <p>Opis repozytorium.</p>
    </div>

  </div>
</body>
</html>
